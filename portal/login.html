<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Client Sign In — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-elev:#fafafa;--line:#e6e6e8;--line-hi:#cdcdd1;
  --text:#1a1a1a;--text-mute:#5a5a5a;--text-dim:#8a8a8a;
  --accent:#d00008;--accent-2:#a80006;--ok:#1a7f37;
  --font-body:'Montserrat',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
}
body{background:var(--bg-elev);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(208,0,8,.04) 1px,transparent 0);background-size:32px 32px;pointer-events:none}
img{max-width:100%;display:block}
.login-card{position:relative;width:100%;max-width:400px;background:var(--bg);border:1px solid var(--line);border-top:3px solid var(--accent);padding:40px 36px;text-align:center}
.login-logo{height:120px;width:auto;margin:0 auto 18px}
h1{font-family:var(--font-body);font-size:24px;font-weight:800;letter-spacing:-.02em}
.sub{font-size:14px;color:var(--text-mute);margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);margin-bottom:7px}
.field input{width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid var(--line-hi);border-radius:8px;background:var(--bg-elev);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;gap:8px;padding:13px 24px;font-family:var(--font-body);font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;border:1px solid transparent;cursor:pointer;transition:background .2s;margin-top:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;font-weight:600;min-height:18px}
.msg-err{color:var(--accent)}
.hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--text-dim)}
.hint a{color:var(--text-mute)}
</style>
</head>
<body>

<div class="login-card">
  <img src="/radiant-logo.png" alt="Radiant Medical Physics Consulting LLC" class="login-logo">
  <h1>Client Sign In</h1>
  <p class="sub">Access your licensed Radiant apps.</p>
  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    <div class="msg msg-err" id="err" role="alert"></div>
  </form>
  <p class="hint">Trouble signing in? Email <a href="mailto:info@Radiant-MPC.com?subject=Client%20portal%20access">info@Radiant-MPC.com</a></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err');
  var btn = document.getElementById('loginBtn');
  err.textContent = '';
  btn.disabled = true;
  try {
    var res = await fetch('/portal/api/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = {};
    try { data = await res.json(); } catch (ex) {}
    if (res.ok) {
      location.href = '/portal/';
    } else {
      err.textContent = data.error || 'Sign-in failed. Please try again.';
      btn.disabled = false;
    }
  } catch (ex) {
    err.textContent = 'Could not reach the server. Please try again.';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
