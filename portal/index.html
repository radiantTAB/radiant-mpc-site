<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Client Portal — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-elev:#fafafa;--bg-card:#f4f4f5;
  --line:#e6e6e8;--line-hi:#cdcdd1;
  --text:#1a1a1a;--text-mute:#5a5a5a;--text-dim:#8a8a8a;
  --accent:#d00008;--accent-2:#a80006;--ok:#1a7f37;
  --font-display:'Montserrat',system-ui,sans-serif;
  --font-body:'Montserrat',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --max-w:1080px;--pad-x:clamp(20px,5vw,64px);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(208,0,8,.035) 1px,transparent 0);background-size:32px 32px;pointer-events:none;z-index:0}
img{max-width:100%;display:block}
a{color:var(--accent);text-decoration:none}

/* Nav */
.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px var(--pad-x);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand-logo{height:120px;width:auto;display:block}
.signout{font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-mute);background:none;border:1px solid var(--line-hi);border-radius:999px;padding:9px 18px;cursor:pointer;transition:all .2s}
.signout:hover{border-color:var(--accent);color:var(--accent)}

/* Hero */
.hero{position:relative;z-index:2;background:var(--bg-elev);border-bottom:1px solid var(--line);padding:44px var(--pad-x)}
.hero-inner{max-width:var(--max-w);margin:0 auto}
.eyebrow{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-mute);margin-bottom:10px}
.hero h1{font-family:var(--font-display);font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-.02em}

/* Section */
.section{position:relative;z-index:2;max-width:var(--max-w);margin:0 auto;padding:44px var(--pad-x) 80px}
.section h2{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:6px}
.section .sub{font-size:14px;color:var(--text-mute);margin-bottom:26px}
.muted{color:var(--text-dim);font-size:14.5px}

/* App cards */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.app-card{background:var(--bg);border:1px solid var(--line);border-top:3px solid var(--accent);padding:24px}
.app-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.app-head h3{font-family:var(--font-display);font-size:19px;font-weight:700}
.app-meta{font-size:13.5px;color:var(--text-mute);margin-bottom:16px}
.badge{display:inline-block;font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:999px;white-space:nowrap}
.badge-ok{background:rgba(26,127,55,.1);color:var(--ok)}
.badge-exp{background:rgba(208,0,8,.08);color:var(--accent)}
.badge-rev{background:rgba(90,90,90,.16);color:#5a5a5a}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;border:1px solid transparent;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2);color:#fff}
.app-launch{margin-bottom:16px}
.app-launch .muted{font-size:13px}
.app-key label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);margin-bottom:6px}
.key-row{display:flex;gap:8px;align-items:stretch}
.key-row code{flex:1;min-width:0;font-family:var(--font-mono);font-size:11.5px;line-height:1.5;background:var(--bg-elev);border:1px solid var(--line);border-radius:6px;padding:8px 10px;overflow-wrap:anywhere}
.rowbtn{font-family:var(--font-body);font-size:12px;font-weight:600;padding:6px 12px;border:1px solid var(--line-hi);border-radius:6px;background:var(--bg);color:var(--text-mute);cursor:pointer;white-space:nowrap;transition:all .15s}
.rowbtn:hover{border-color:var(--accent);color:var(--accent)}

/* Footer */
.footer{position:relative;z-index:2;padding:32px var(--pad-x);border-top:1px solid var(--line);background:var(--bg-elev);font-size:13px;color:var(--text-dim);text-align:center}

@media(max-width:720px){ .brand-logo{height:80px} }
</style>
</head>
<body>

<nav class="nav">
  <a href="/index.html"><img src="/radiant-logo.png" alt="Radiant Medical Physics Consulting LLC" class="brand-logo"></a>
  <button class="signout" id="signoutBtn">Sign out</button>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div class="eyebrow">Client Portal</div>
    <h1>Welcome, <span id="clientName">…</span></h1>
  </div>
</header>

<section class="section">
  <h2>Your Radiant licenses</h2>
  <div class="sub">The apps you are licensed for. Hosted apps launch in your browser; desktop apps install on your machine and activate with the key shown.</div>
  <div id="appList"><p class="muted">Loading…</p></div>
</section>

<footer class="footer">© 2026 Radiant Medical Physics Consulting LLC</footer>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function renderApp(a){
  var cls = a.status === 'Active' ? 'badge-ok'
    : (a.status === 'Revoked' ? 'badge-rev' : 'badge-exp');
  var launch = a.hosted && a.launch_url
    ? '<a class="btn btn-primary" href="' + esc(a.launch_url) + '">Launch</a>'
    : '<span class="muted">Desktop app — install it, then activate with the key below.</span>';
  return '<div class="app-card">' +
    '<div class="app-head"><h3>' + esc(a.name) + '</h3>' +
      '<span class="badge ' + cls + '">' + esc(a.status) + '</span></div>' +
    '<div class="app-meta">Licensed through ' + esc(a.expires) + '</div>' +
    '<div class="app-launch">' + launch + '</div>' +
    '<div class="app-key"><label>License key</label>' +
      '<div class="key-row"><code>' + esc(a.key) + '</code>' +
      '<button class="rowbtn" onclick="copyKey(this)">Copy</button></div></div>' +
  '</div>';
}

function copyKey(btn){
  var code = btn.parentNode.querySelector('code');
  if (!code) return;
  var text = code.textContent;
  if (navigator.clipboard){ navigator.clipboard.writeText(text); }
  else {
    var r = document.createRange();
    r.selectNode(code);
    var sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(r);
    try { document.execCommand('copy'); } catch (e) {}
    sel.removeAllRanges();
  }
  var old = btn.textContent;
  btn.textContent = 'Copied';
  setTimeout(function(){ btn.textContent = old; }, 1500);
}

async function loadMe(){
  var wrap = document.getElementById('appList');
  try {
    var res = await fetch('/portal/api/me');
    if (res.status === 401){ location.href = '/portal/login.html'; return; }
    var data = await res.json();
    document.getElementById('clientName').textContent = data.client.name;
    if (!data.apps.length){
      wrap.innerHTML = '<p class="muted">No licensed apps are linked to your account yet. If that looks wrong, contact Radiant.</p>';
      return;
    }
    wrap.innerHTML = '<div class="app-grid">' + data.apps.map(renderApp).join('') + '</div>';
  } catch (e) {
    wrap.innerHTML = '<p class="muted">Could not load your licenses — ' + esc(e.message) + '</p>';
  }
}

document.getElementById('signoutBtn').addEventListener('click', async function(){
  try { await fetch('/portal/api/logout', { method: 'POST' }); } catch (e) {}
  location.href = '/portal/login.html';
});

loadMe();
</script>

</body>
</html>
